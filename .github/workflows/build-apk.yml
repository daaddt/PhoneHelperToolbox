              }
          
              private String shortError(String value) {
                  if (value == null) return "未知错误";
                  String cleaned = value.replace("\n", " ").trim();
                  if (cleaned.length() > 500) return cleaned.substring(0, 500) + "...";
                  return cleaned;
              }
          
              private void copyText(String label, String value) {
                  ClipboardManager manager = (ClipboardManager) getSystemService(CLIPBOARD_SERVICE);
                  if (manager != null) {
                      manager.setPrimaryClip(ClipData.newPlainText(label, value));
                      statusText.setText("已复制：" + label);
                      toast("已复制");
                  }
              }
          
              private void openUrl(String url) {
                  try {
                      startActivity(new Intent(Intent.ACTION_VIEW, Uri.parse(url)));
                  } catch (Exception e) {
                      toast("打不开这个网址");
                  }
              }
          
              private void ensureDefaults() {
                  if (!pref.getBoolean("defaultsReady", false)) {
                      JSONArray texts = new JSONArray();
                      addDefaultText(texts, "GitHub Actions 文件名", ".github/workflows/build-apk.yml");
                      addDefaultText(texts, "OpenRouter API 地址", "https://openrouter.ai/api/v1/chat/completions");
                      addDefaultText(texts, "OpenRouter 免费模型", "openrouter/free");
                      addDefaultText(texts, "提交信息：添加 APK 打包流程", "添加安卓APK打包流程");
                      addDefaultText(texts, "提交信息：升级版本", "升级版本");
                      JSONArray links = new JSONArray();
                      addDefaultLink(links, "GitHub", "https://github.com");
                      addDefaultLink(links, "OpenRouter", "https://openrouter.ai");
                      addDefaultLink(links, "OpenRouter Keys", "https://openrouter.ai/settings/keys");
                      addDefaultLink(links, "DeepSeek API", "https://platform.deepseek.com");
                      pref.edit()
                              .putString("texts", texts.toString())
                              .putString("links", links.toString())
                              .putBoolean("defaultsReady", true)
                              .putInt("pomoFocusMin", 25)
                              .putInt("pomoRestMin", 5)
                              .apply();
                  }
              }
          
              private void addDefaultText(JSONArray array, String title, String content) {
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title);
                      obj.put("content", content);
                      array.put(obj);
                  } catch (Exception ignored) {}
              }
          
              private void addDefaultLink(JSONArray array, String title, String url) {
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title);
                      obj.put("url", url);
                      array.put(obj);
                  } catch (Exception ignored) {}
              }
          
              private JSONArray loadArray(String key) {
                  try {
                      return new JSONArray(pref.getString(key, "[]"));
                  } catch (Exception e) {
                      return new JSONArray();
                  }
              }
          
              private void saveArray(String key, JSONArray array) {
                  pref.edit().putString(key, array.toString()).apply();
              }
          
              private void removeItem(String key, int index) {
                  JSONArray source = loadArray(key);
                  JSONArray result = new JSONArray();
                  for (int i = 0; i < source.length(); i++) {
                      if (i == index) continue;
                      try {
                          result.put(source.getJSONObject(i));
                      } catch (Exception ignored) {}
                  }
                  saveArray(key, result);
              }
          
              private String preview(String value) {
                  String cleaned = value.replace("\n", " ").trim();
                  if (cleaned.length() <= 120) return cleaned;
                  return cleaned.substring(0, 120) + "...";
              }
          
