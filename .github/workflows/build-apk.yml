              private void buildBackupPage() {
                  backupPage.addView(sectionTitle("数据备份"));
                  backupPage.addView(infoCard("导出和导入常用文本、快捷链接。不会导出 AI Key，避免密钥泄露。"));
                  LinearLayout actions = row();
                  Button export = button("导出备份");
                  Button importBackup = button("导入备份");
                  actions.addView(export, weight());
                  actions.addView(importBackup, weight());
                  backupPage.addView(actions);
                  backupPage.addView(infoCard("导出的文件是 JSON 文本。换手机、重装 App 或误删内容时，可以用它恢复常用文本和快捷链接。"));
                  export.setOnClickListener(v -> createBackupFile());
                  importBackup.setOnClickListener(v -> chooseBackupFile());
              }
          
              private void chooseTextFile() {
                  Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                  intent.addCategory(Intent.CATEGORY_OPENABLE);
                  intent.setType("*/*");
                  String[] mimeTypes = new String[]{
                          "text/*",
                          "application/json",
                          "application/xml",
                          "application/x-yaml",
                          "application/octet-stream"
                  };
                  intent.putExtra(Intent.EXTRA_MIME_TYPES, mimeTypes);
                  startActivityForResult(intent, PICK_TEXT_FILE);
              }
          
              private void createBackupFile() {
                  Intent intent = new Intent(Intent.ACTION_CREATE_DOCUMENT);
                  intent.addCategory(Intent.CATEGORY_OPENABLE);
                  intent.setType("application/json");
                  intent.putExtra(Intent.EXTRA_TITLE, "phone-helper-backup.json");
                  startActivityForResult(intent, CREATE_BACKUP_FILE);
              }
          
              private void chooseBackupFile() {
                  Intent intent = new Intent(Intent.ACTION_OPEN_DOCUMENT);
                  intent.addCategory(Intent.CATEGORY_OPENABLE);
                  intent.setType("*/*");
                  String[] mimeTypes = new String[]{"application/json", "text/*", "application/octet-stream"};
                  intent.putExtra(Intent.EXTRA_MIME_TYPES, mimeTypes);
                  startActivityForResult(intent, PICK_BACKUP_FILE);
              }
          
              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == PICK_TEXT_FILE && resultCode == RESULT_OK && data != null && data.getData() != null) {
                      importTextFile(data.getData());
                  } else if (requestCode == CREATE_BACKUP_FILE && resultCode == RESULT_OK && data != null && data.getData() != null) {
                      exportBackup(data.getData());
                  } else if (requestCode == PICK_BACKUP_FILE && resultCode == RESULT_OK && data != null && data.getData() != null) {
                      importBackup(data.getData());
                  }
              }
          
              private void importTextFile(Uri uri) {
                  try {
                      getContentResolver().takePersistableUriPermission(uri, Intent.FLAG_GRANT_READ_URI_PERMISSION);
                  } catch (Exception ignored) {
                  }
                  try (InputStream inputStream = getContentResolver().openInputStream(uri)) {
                      if (inputStream == null) {
                          toast("无法读取这个文件");
                          return;
                      }
                      String content = readAll(inputStream);
                      longTextInput.setText(content);
                      splitResultList.removeAllViews();
                      statusText.setText("已导入文件，共 " + content.length() + " 字");
                      toast("导入成功");
                      showPage("split");
                  } catch (Exception e) {
                      statusText.setText("导入失败：" + shortError(e.getMessage()));
                      toast("导入失败");
                  }
              }
          
              private void exportBackup(Uri uri) {
                  try (OutputStream outputStream = getContentResolver().openOutputStream(uri)) {
                      if (outputStream == null) {
                          toast("无法创建备份文件");
                          return;
                      }
                      JSONObject backup = new JSONObject();
                      backup.put("version", 1);
                      backup.put("texts", loadArray("texts"));
                      backup.put("links", loadArray("links"));
                      outputStream.write(backup.toString(2).getBytes(StandardCharsets.UTF_8));
                      statusText.setText("备份已导出");
                      toast("导出成功");
                  } catch (Exception e) {
                      statusText.setText("导出失败：" + shortError(e.getMessage()));
                      toast("导出失败");
                  }
              }
          
              private void importBackup(Uri uri) {
                  try (InputStream inputStream = getContentResolver().openInputStream(uri)) {
                      if (inputStream == null) {
                          toast("无法读取备份文件");
                          return;
                      }
                      JSONObject backup = new JSONObject(readAll(inputStream));
                      JSONArray texts = backup.optJSONArray("texts");
                      JSONArray links = backup.optJSONArray("links");
                      if (texts == null && links == null) {
                          toast("这不是有效的备份文件");
                          return;
                      }
                      if (texts != null) saveArray("texts", texts);
                      if (links != null) saveArray("links", links);
                      renderSavedTexts();
                      renderLinks();
                      statusText.setText("备份已导入");
                      toast("导入成功");
                  } catch (Exception e) {
                      statusText.setText("导入失败：" + shortError(e.getMessage()));
                      toast("导入失败");
                  }
              }
          
              private void generateChunks() {
                  String source = longTextInput.getText().toString();
                  if (source.trim().isEmpty()) {
                      toast("请先粘贴长文本");
                      return;
                  }
                  int size = parseInt(splitSizeInput.getText().toString(), 3000);
                  size = Math.max(500, Math.min(10000, size));
                  splitSizeInput.setText(String.valueOf(size));
                  splitResultList.removeAllViews();
                  int count = 0;
                  for (int start = 0; start < source.length(); start += size) {
                      int end = Math.min(source.length(), start + size);
                      String chunk = source.substring(start, end);
                      count++;
                      splitResultList.addView(chunkCard(count, chunk));
                  }
                  hideKeyboard();
                  statusText.setText("已生成 " + count + " 段");
              }
          
              private View chunkCard(int index, String chunk) {
                  LinearLayout card = card();
                  TextView title = text(String.format("第 %02d 段 · %d 字", index, chunk.length()), 18, Color.WHITE);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  card.addView(title);
                  card.addView(text(preview(chunk), 14, Color.LTGRAY));
                  Button copy = button("复制第 " + String.format("%02d", index) + " 段");
                  copy.setOnClickListener(v -> copyText("第 " + index + " 段", chunk));
                  card.addView(copy);
                  return card;
              }
          
              private void addSavedText() {
                  String title = titleInput.getText().toString().trim();
                  String content = contentInput.getText().toString();
                  if (title.isEmpty() || content.trim().isEmpty()) {
                      toast("标题和内容都要填写");
                      return;
                  }
                  JSONArray array = loadArray("texts");
                  try {
                      JSONObject obj = new JSONObject();
                      obj.put("title", title);
                      obj.put("content", content);
                      array.put(obj);
                      saveArray("texts", array);
                  } catch (Exception ignored) {}
                  titleInput.setText("");
                  contentInput.setText("");
                  renderSavedTexts();
                  hideKeyboard();
                  statusText.setText("已添加常用文本");
              }
          
              private void renderSavedTexts() {
                  if (savedTextList == null) return;
                  savedTextList.removeAllViews();
                  JSONArray array = loadArray("texts");
                  for (int i = 0; i < array.length(); i++) {
                      try {
                          JSONObject obj = array.getJSONObject(i);
                          savedTextList.addView(savedTextCard(i, obj.optString("title"), obj.optString("content")));
                      } catch (Exception ignored) {}
                  }
              }
          
              private View savedTextCard(int index, String title, String content) {
