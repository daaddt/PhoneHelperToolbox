name: 构建手机助手工具箱 APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库
        uses: actions/checkout@v4

      - name: 安装 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成安卓项目源码
        shell: bash
        run: |
          set -e
          mkdir -p "$(dirname 'settings.gradle')"
          cat > 'settings.gradle' <<'EOF_settings_gradle'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = "PhoneHelperToolbox"
          include ":app"
          EOF_settings_gradle

          mkdir -p "$(dirname 'build.gradle')"
          cat > 'build.gradle' <<'EOF_build_gradle'
          plugins {
              id "com.android.application" version "8.5.2" apply false
          }
          EOF_build_gradle

          mkdir -p "$(dirname 'app/build.gradle')"
          cat > 'app/build.gradle' <<'EOF_app_build_gradle'
          plugins {
              id "com.android.application"
          }
          
          android {
              namespace "com.trae.phonehelper"
              compileSdk 35
          
              defaultConfig {
                  applicationId "com.trae.phonehelper"
                  minSdk 26
                  targetSdk 35
                  versionCode 5
                  versionName "1.4"
              }
          }
          EOF_app_build_gradle

          mkdir -p "$(dirname 'app/src/main/AndroidManifest.xml')"
          cat > 'app/src/main/AndroidManifest.xml' <<'EOF_app_src_main_AndroidManifest_xml'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.VIBRATE" />
          
              <application
                  android:allowBackup="true"
                  android:theme="@style/AppTheme"
                  android:label="手机助手工具箱"
                  android:resizeableActivity="true"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF_app_src_main_AndroidManifest_xml

          mkdir -p "$(dirname 'app/src/main/res/values/styles.xml')"
          cat > 'app/src/main/res/values/styles.xml' <<'EOF_app_src_main_res_values_styles_xml'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="@android:style/Theme.Material.NoActionBar">
                  <item name="android:fontFamily">sans</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:statusBarColor">#07111F</item>
                  <item name="android:navigationBarColor">#07111F</item>
                  <item name="android:colorAccent">#38BDF8</item>
              </style>
          </resources>
          EOF_app_src_main_res_values_styles_xml

          mkdir -p "$(dirname 'app/src/main/java/com/trae/phonehelper/MainActivity.java')"
          cat > 'app/src/main/java/com/trae/phonehelper/MainActivity.java' <<'EOF_app_src_main_java_com_trae_phonehelper_MainActivity_java'
          package com.trae.phonehelper;
          
          import android.app.Activity;
          import android.content.ClipData;
          import android.content.ClipboardManager;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.graphics.Color;
          import android.graphics.Typeface;
          import android.graphics.drawable.GradientDrawable;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.SystemClock;
          import android.text.InputType;
          import android.os.Vibrator;
          import android.view.Gravity;
          import android.view.View;
          import android.view.inputmethod.InputMethodManager;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.LinearLayout;
          import android.widget.ScrollView;
          import android.widget.TextView;
          import android.widget.Toast;
          
          import org.json.JSONArray;
          import org.json.JSONObject;
          
          import java.io.BufferedReader;
          import java.io.InputStream;
          import java.io.InputStreamReader;
          import java.io.OutputStream;
          import java.net.HttpURLConnection;
          import java.net.URL;
          import java.nio.charset.StandardCharsets;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;
          
          public class MainActivity extends Activity {
              private static final String PREF = "phone_helper_pref";
              private static final int PICK_TEXT_FILE = 3001;
              private static final int CREATE_BACKUP_FILE = 3002;
              private static final int PICK_BACKUP_FILE = 3003;
              private SharedPreferences pref;
              private final Handler handler = new Handler();
          
              private LinearLayout homePage, splitPage, textPage, linkPage, timerPage, pomoPage, aiPage, aiSettingsPage, backupPage;
              private LinearLayout splitResultList, savedTextList, linkList, aiMessageList;
              private EditText longTextInput, splitSizeInput, titleInput, contentInput, linkTitleInput, linkUrlInput;
              private EditText aiInput, apiUrlInput, apiKeyInput, modelInput, systemPromptInput;
              private TextView statusText, timerDisplay, pomoDisplay, pomoStateText, pomoCountText;
              private Button homeTab, splitTab, textTab, linkTab, timerTab, pomoTab, aiTab, aiSettingsTab, backupTab;
              private Button stopwatchTab, countdownTab, timerStartPause;
              private EditText timerMinuteInput, timerSecondInput, pomoFocusInput, pomoRestInput;
          
              private String timerMode = "stopwatch";
              private boolean stopwatchRunning = false;
              private long stopwatchElapsed = 0;
              private long stopwatchStartedAt = 0;
              private boolean countdownRunning = false;
              private long countdownDuration = 5 * 60 * 1000L;
              private long countdownElapsed = 0;
              private long countdownStartedAt = 0;
          
              private boolean pomoRunning = false;
              private boolean pomoFocus = true;
              private long pomoDuration = 25 * 60 * 1000L;
              private long pomoElapsed = 0;
              private long pomoStartedAt = 0;
          
              private JSONArray aiMessages = new JSONArray();
              private boolean aiSending = false;
          
              private final Runnable tick = new Runnable() {
                  @Override
                  public void run() {
                      updateTimerDisplay();
                      updatePomoDisplay();
                      handler.postDelayed(this, 250);
                  }
              };
          
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  pref = getSharedPreferences(PREF, MODE_PRIVATE);
                  ensureDefaults();
                  restoreTimerState();
                  restorePomoState();
                  loadAiMessages();
                  buildUi();
                  renderSavedTexts();
                  renderLinks();
                  handler.post(tick);
              }
          
              @Override
              protected void onPause() {
                  super.onPause();
                  saveTimerState();
                  savePomoState();
              }
          
              @Override
              protected void onDestroy() {
                  super.onDestroy();
                  saveTimerState();
                  savePomoState();
                  handler.removeCallbacks(tick);
              }
          
              private void buildUi() {
                  ScrollView scroll = new ScrollView(this);
                  scroll.setFillViewport(true);
                  scroll.setBackgroundColor(Color.rgb(7, 17, 31));
                  LinearLayout root = new LinearLayout(this);
                  root.setOrientation(LinearLayout.VERTICAL);
                  root.setPadding(24, 34, 24, 28);
                  scroll.addView(root);
          
                  TextView title = text("手机助手工具箱", 32, Color.WHITE);
                  title.setTypeface(Typeface.DEFAULT_BOLD);
                  title.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.addView(title);
                  TextView subtitle = text("复制 · 快捷 · 计时 · 番茄钟 · AI", 14, Color.rgb(148, 163, 184));
                  subtitle.setGravity(Gravity.CENTER_HORIZONTAL);
                  root.addView(subtitle);
          
                  LinearLayout tabs1 = row();
                  homeTab = button("首页");
                  splitTab = button("复制");
                  textTab = button("文本");
                  tabs1.addView(homeTab, weight());
                  tabs1.addView(splitTab, weight());
                  tabs1.addView(textTab, weight());
                  root.addView(tabs1);
          
                  LinearLayout tabs2 = row();
                  linkTab = button("链接");
                  timerTab = button("计时器");
                  pomoTab = button("番茄钟");
                  tabs2.addView(linkTab, weight());
                  tabs2.addView(timerTab, weight());
                  tabs2.addView(pomoTab, weight());
                  root.addView(tabs2);
          
                  LinearLayout tabs3 = row();
                  aiTab = button("AI聊天");
                  aiSettingsTab = button("AI设置");
                  backupTab = button("备份");
                  tabs3.addView(aiTab, weight());
                  tabs3.addView(aiSettingsTab, weight());
                  tabs3.addView(backupTab, weight());
                  root.addView(tabs3);
          
                  statusText = text("准备就绪", 14, Color.rgb(52, 211, 153));
                  root.addView(statusText);
          
                  homePage = page();
                  splitPage = page();
                  textPage = page();
                  linkPage = page();
                  timerPage = page();
                  pomoPage = page();
                  aiPage = page();
                  aiSettingsPage = page();
                  backupPage = page();
                  root.addView(homePage);
                  root.addView(splitPage);
                  root.addView(textPage);
                  root.addView(linkPage);
                  root.addView(timerPage);
                  root.addView(pomoPage);
                  root.addView(aiPage);
                  root.addView(aiSettingsPage);
                  root.addView(backupPage);
          
                  buildHomePage();
                  buildSplitPage();
                  buildTextPage();
                  buildLinkPage();
                  buildTimerPage();
                  buildPomoPage();
                  buildAiPage();
                  buildAiSettingsPage();
                  buildBackupPage();
          
                  homeTab.setOnClickListener(v -> showPage("home"));
                  splitTab.setOnClickListener(v -> showPage("split"));
                  textTab.setOnClickListener(v -> showPage("text"));
                  linkTab.setOnClickListener(v -> showPage("link"));
                  timerTab.setOnClickListener(v -> showPage("timer"));
                  pomoTab.setOnClickListener(v -> showPage("pomo"));
                  aiTab.setOnClickListener(v -> showPage("ai"));
                  aiSettingsTab.setOnClickListener(v -> showPage("aiSettings"));
                  backupTab.setOnClickListener(v -> showPage("backup"));
          
                  setContentView(scroll);
                  showPage("home");
              }
          
              private void buildHomePage() {
                  homePage.addView(sectionTitle("功能目录"));
                  homePage.addView(infoCard("这是你的手机操作增强工具箱。常用复制、网址打开、计时、番茄钟和 AI 都放在这里。"));
                  homePage.addView(sectionTitle("常用工具"));
                  homePage.addView(homeButton("分段复制", "把长代码、长提示词、工作流自动拆成多段复制", "split"));
                  homePage.addView(homeButton("常用文本", "保存 API 地址、模型名、提交信息等常用内容", "text"));
                  homePage.addView(homeButton("快捷打开", "一键打开 GitHub、OpenRouter 等常用网页", "link"));
                  homePage.addView(homeButton("数据备份", "导出或导入常用文本和快捷链接", "backup"));
                  homePage.addView(sectionTitle("学习工具"));
                  homePage.addView(homeButton("计时器", "正计时、倒计时和快速倒计时", "timer"));
                  homePage.addView(homeButton("番茄钟", "专注 25 分钟，休息 5 分钟，记录今日完成数", "pomo"));
                  homePage.addView(sectionTitle("AI工具"));
                  homePage.addView(homeButton("AI聊天", "接入 OpenAI 兼容接口，支持 openrouter/free", "ai"));
                  homePage.addView(homeButton("AI设置", "填写 API 地址、API Key、模型名和智能体设定", "aiSettings"));
              }
          
              private View homeButton(String title, String desc, String pageName) {
                  LinearLayout card = card();
                  TextView t = text(title, 20, Color.WHITE);
                  t.setTypeface(Typeface.DEFAULT_BOLD);
                  card.addView(t);
                  card.addView(text(desc, 14, Color.LTGRAY));
                  Button open = button("打开 " + title);
                  open.setOnClickListener(v -> showPage(pageName));
                  card.addView(open);
                  return card;
              }
          
              private void buildSplitPage() {
                  splitPage.addView(sectionTitle("长文本分段复制"));
                  splitPage.addView(infoCard("把很长的代码、工作流、提示词粘到这里，App 会自动分段，每段都有复制按钮。"));
                  longTextInput = inputBox("粘贴长文本");
                  longTextInput.setMinLines(8);
                  longTextInput.setGravity(Gravity.TOP);
                  splitPage.addView(longTextInput);
                  splitSizeInput = inputBox("每段最大字数，默认 3000");
                  splitSizeInput.setText("3000");
                  splitSizeInput.setSingleLine(true);
                  splitPage.addView(labelWrap("分段长度", splitSizeInput));
                  LinearLayout actions = row();
                  Button importFile = button("从文件导入");
                  Button generate = button("生成分段");
                  Button clear = button("清空");
                  actions.addView(importFile, weight());
                  actions.addView(generate, weight());
                  actions.addView(clear, weight());
                  splitPage.addView(actions);
                  splitResultList = new LinearLayout(this);
                  splitResultList.setOrientation(LinearLayout.VERTICAL);
                  splitPage.addView(splitResultList);
                  importFile.setOnClickListener(v -> chooseTextFile());
                  generate.setOnClickListener(v -> generateChunks());
                  clear.setOnClickListener(v -> {
                      longTextInput.setText("");
                      splitResultList.removeAllViews();
                      statusText.setText("已清空");
                  });
              }
          
              private void buildTextPage() {
                  textPage.addView(sectionTitle("常用文本"));
                  textPage.addView(infoCard("保存常用路径、API 地址、模型名、提交信息。以后点一下就能复制。"));
                  titleInput = inputBox("标题，例如 OpenRouter API 地址");
                  titleInput.setSingleLine(true);
                  contentInput = inputBox("内容");
                  contentInput.setMinLines(3);
                  contentInput.setGravity(Gravity.TOP);
                  textPage.addView(labelWrap("标题", titleInput));
                  textPage.addView(labelWrap("内容", contentInput));
                  Button add = button("添加常用文本");
                  textPage.addView(add);
                  savedTextList = new LinearLayout(this);
                  savedTextList.setOrientation(LinearLayout.VERTICAL);
                  textPage.addView(savedTextList);
                  add.setOnClickListener(v -> addSavedText());
              }
          
              private void buildLinkPage() {
                  linkPage.addView(sectionTitle("快捷打开"));
                  linkPage.addView(infoCard("保存常用网站，一键打开 GitHub、OpenRouter、Actions 等页面。"));
                  linkTitleInput = inputBox("标题，例如 GitHub");
                  linkTitleInput.setSingleLine(true);
                  linkUrlInput = inputBox("网址，例如 https://github.com");
                  linkUrlInput.setSingleLine(true);
                  linkPage.addView(labelWrap("标题", linkTitleInput));
                  linkPage.addView(labelWrap("网址", linkUrlInput));
                  Button add = button("添加快捷链接");
                  linkPage.addView(add);
                  linkList = new LinearLayout(this);
                  linkList.setOrientation(LinearLayout.VERTICAL);
                  linkPage.addView(linkList);
                  add.setOnClickListener(v -> addLink());
              }
          
              private void buildTimerPage() {
                  timerPage.addView(sectionTitle("计时器"));
                  timerPage.addView(infoCard("包含正计时、倒计时和快速倒计时。适合临时计时，不替代闹钟。"));
                  LinearLayout modeRow = row();
                  stopwatchTab = button("正计时");
                  countdownTab = button("倒计时");
                  modeRow.addView(stopwatchTab, weight());
                  modeRow.addView(countdownTab, weight());
                  timerPage.addView(modeRow);
                  timerDisplay = text("00:00.0", 56, Color.WHITE);
                  timerDisplay.setGravity(Gravity.CENTER);
                  timerDisplay.setPadding(0, 28, 0, 20);
                  timerPage.addView(timerDisplay);
                  LinearLayout edit = row();
                  timerMinuteInput = inputBox("分钟");
                  timerMinuteInput.setText("5");
                  timerMinuteInput.setSingleLine(true);
                  timerSecondInput = inputBox("秒");
                  timerSecondInput.setText("0");
                  timerSecondInput.setSingleLine(true);
                  Button set = button("设定");
                  edit.addView(labelWrap("分钟", timerMinuteInput), weight());
                  edit.addView(labelWrap("秒", timerSecondInput), weight());
                  edit.addView(set, weight());
                  timerPage.addView(edit);
                  LinearLayout controls = row();
                  timerStartPause = button("开始");
                  Button reset = button("重置");
                  controls.addView(timerStartPause, weight());
                  controls.addView(reset, weight());
                  timerPage.addView(controls);
                  LinearLayout quick1 = row();
                  quick1.addView(quickTimerButton("1 分钟", 1), weight());
                  quick1.addView(quickTimerButton("3 分钟", 3), weight());
                  timerPage.addView(quick1);
                  LinearLayout quick2 = row();
                  quick2.addView(quickTimerButton("5 分钟", 5), weight());
                  quick2.addView(quickTimerButton("10 分钟", 10), weight());
                  timerPage.addView(quick2);
                  stopwatchTab.setOnClickListener(v -> {
                      timerMode = "stopwatch";
                      updateTimerDisplay();
                      saveTimerState();
                  });
                  countdownTab.setOnClickListener(v -> {
                      timerMode = "countdown";
                      updateTimerDisplay();
                      saveTimerState();
                  });
                  set.setOnClickListener(v -> setCountdownFromInput());
                  timerStartPause.setOnClickListener(v -> toggleTimer());
                  reset.setOnClickListener(v -> resetTimer());
              }
          
              private void buildPomoPage() {
                  pomoPage.addView(sectionTitle("番茄钟"));
                  pomoPage.addView(infoCard("默认专注 25 分钟、休息 5 分钟。适合学习节奏管理。"));
                  pomoStateText = text("准备开始专注", 18, Color.rgb(125, 211, 252));
                  pomoStateText.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoStateText);
                  pomoDisplay = text("25:00", 60, Color.WHITE);
                  pomoDisplay.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoDisplay);
                  pomoCountText = text("今日完成 0 个番茄", 16, Color.rgb(52, 211, 153));
                  pomoCountText.setGravity(Gravity.CENTER);
                  pomoPage.addView(pomoCountText);
                  LinearLayout edit = row();
                  pomoFocusInput = inputBox("专注分钟");
                  pomoFocusInput.setText("25");
                  pomoFocusInput.setSingleLine(true);
                  pomoRestInput = inputBox("休息分钟");
                  pomoRestInput.setText("5");
                  pomoRestInput.setSingleLine(true);
                  Button apply = button("应用");
                  edit.addView(labelWrap("专注", pomoFocusInput), weight());
                  edit.addView(labelWrap("休息", pomoRestInput), weight());
                  edit.addView(apply, weight());
                  pomoPage.addView(edit);
                  LinearLayout controls = row();
                  Button startPause = button("开始/暂停");
                  Button reset = button("重置");
                  Button done = button("完成一个");
                  controls.addView(startPause, weight());
                  controls.addView(reset, weight());
                  controls.addView(done, weight());
                  pomoPage.addView(controls);
                  apply.setOnClickListener(v -> applyPomoSettings());
                  startPause.setOnClickListener(v -> togglePomo());
                  reset.setOnClickListener(v -> resetPomo());
                  done.setOnClickListener(v -> finishOnePomo());
                  updatePomoDisplay();
              }
          
              private void buildAiPage() {
                  aiPage.addView(sectionTitle("AI聊天"));
                  aiPage.addView(infoCard("这里使用 OpenAI 兼容接口。首次使用请先进入 AI设置，填写 API Key。"));
                  aiMessageList = new LinearLayout(this);
                  aiMessageList.setOrientation(LinearLayout.VERTICAL);
                  aiPage.addView(aiMessageList);
          
                  aiInput = inputBox("输入你想问 AI 的内容");
                  aiInput.setMinLines(2);
                  aiInput.setMaxLines(5);
                  aiPage.addView(aiInput);
          
                  LinearLayout actions = row();
                  Button send = button("发送");
                  Button clear = button("清空");
                  actions.addView(send, weight());
                  actions.addView(clear, weight());
                  aiPage.addView(actions);
          
                  send.setOnClickListener(v -> sendAiMessage());
                  clear.setOnClickListener(v -> {
                      aiMessages = new JSONArray();
                      saveAiMessages();
                      renderAiMessages();
                      statusText.setText("AI 对话已清空");
                  });
                  renderAiMessages();
              }
          
              private void buildAiSettingsPage() {
                  aiSettingsPage.addView(sectionTitle("AI设置"));
                  aiSettingsPage.addView(infoCard("API Key 只保存在本机，不会写进 GitHub。推荐模型名保持 openrouter/free。"));
          
                  apiUrlInput = inputBox("API 地址");
                  apiUrlInput.setText(pref.getString("aiApiUrl", "https://openrouter.ai/api/v1/chat/completions"));
                  aiSettingsPage.addView(labelWrap("API 地址", apiUrlInput));
          
                  apiKeyInput = inputBox("API Key");
                  apiKeyInput.setSingleLine(true);
                  apiKeyInput.setInputType(InputType.TYPE_CLASS_TEXT | InputType.TYPE_TEXT_VARIATION_PASSWORD);
                  apiKeyInput.setText(pref.getString("aiApiKey", ""));
                  aiSettingsPage.addView(labelWrap("API Key", apiKeyInput));
          
                  modelInput = inputBox("模型名");
                  modelInput.setSingleLine(true);
                  modelInput.setText(pref.getString("aiModel", "openrouter/free"));
                  aiSettingsPage.addView(labelWrap("模型名", modelInput));
          
                  systemPromptInput = inputBox("智能体设定");
                  systemPromptInput.setMinLines(4);
                  systemPromptInput.setText(pref.getString("aiSystemPrompt", "你是一个耐心、有逻辑、说中文的智能助手。回答要清晰、实用、不过度啰嗦。"));
                  aiSettingsPage.addView(labelWrap("智能体设定", systemPromptInput));
          
                  LinearLayout actions = row();
                  Button save = button("保存设置");
                  Button test = button("测试连接");
                  Button defaults = button("默认配置");
                  actions.addView(save, weight());
                  actions.addView(test, weight());
                  actions.addView(defaults, weight());
                  aiSettingsPage.addView(actions);
          
                  save.setOnClickListener(v -> {
                      saveAiSettings();
                      statusText.setText("AI 设置已保存");
                      showPage("ai");
                  });
                  test.setOnClickListener(v -> {
                      saveAiSettings();
                      testAiConnection();
                  });
